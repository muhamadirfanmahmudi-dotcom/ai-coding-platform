<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI Forge - 代写平台</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#b7004f",
        "primary-container": "#e40a65",
        "on-primary": "#ffffff",
        "on-primary-container": "#fffbff",
        "secondary": "#4648d4",
        "secondary-container": "#6063ee",
        "on-secondary": "#ffffff",
        "on-secondary-container": "#fffbff",
        "tertiary": "#a12e70",
        "tertiary-container": "#c0488a",
        "on-tertiary-container": "#fffbff",
        "surface": "#f9f9ff",
        "surface-variant": "#d8e3fb",
        "surface-container": "#e7eeff",
        "surface-container-low": "#f0f3ff",
        "surface-container-high": "#dee8ff",
        "surface-container-highest": "#d8e3fb",
        "surface-dim": "#cfdaf2",
        "on-surface": "#111c2d",
        "on-surface-variant": "#5b3f44",
        "outline": "#8f6f74",
        "outline-variant": "#e4bdc3",
        "error": "#ba1a1a",
        "error-container": "#ffdad6",
        "on-error": "#ffffff",
        "on-error-container": "#93000a",
        "background": "#f9f9ff",
        "on-background": "#111c2d",
        "inverse-surface": "#263143",
        "inverse-on-surface": "#ecf1ff",
      },
      borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" },
      fontFamily: {
        "display": ["Plus Jakarta Sans"],
        "body": ["Inter"],
        "mono": ["JetBrains Mono"],
      },
    },
  },
}
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .glass-panel { background: rgba(255,255,255,0.7); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.5); }
  body { background-color: #f9f9ff; color: #111c2d; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(183,0,79,0.1); border-radius: 10px; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .anim-slide-up { animation: slideUp .5s ease; }
  .anim-fade-in { animation: fadeIn .4s ease; }
</style>
</head>
<body class="font-body text-base">

<!-- ═══════════ Auth Page ═══════════ -->
<div id="auth-page" class="min-h-screen flex items-center justify-center px-4">
  <div class="glass-panel rounded-lg p-10 w-full max-w-md anim-slide-up shadow-[0_16px_32px_-12px_rgba(30,41,59,0.08)]">
    <div class="text-center mb-8">
      <h1 class="font-display text-3xl font-extrabold tracking-tight text-primary">AI Forge</h1>
      <p class="text-on-surface-variant text-sm mt-2">发布需求，让开发者帮你搞定</p>
    </div>
    <div class="flex gap-1 bg-surface-container rounded-xl p-1 mb-6">
      <div class="auth-tab flex-1 text-center py-2.5 rounded-lg text-sm font-medium cursor-pointer transition-all active:scale-95 bg-surface-container-low text-on-surface shadow-sm" onclick="switchAuthTab('login', this)">登录</div>
      <div class="auth-tab flex-1 text-center py-2.5 rounded-lg text-sm font-medium cursor-pointer transition-all active:scale-95 text-on-surface-variant" onclick="switchAuthTab('register', this)">注册</div>
    </div>
    <div id="login-form">
      <div class="flex gap-3 mb-5">
        <div class="role-btn active flex-1 p-3 rounded-xl border border-outline-variant/30 bg-surface-container-low text-center cursor-pointer transition-all active:scale-95 hover:bg-surface-container" onclick="selectRole('buyer', this)">
          <span class="material-symbols-outlined text-2xl text-primary">person</span>
          <div class="text-xs font-medium text-on-surface mt-1">我是买家</div>
        </div>
        <div class="role-btn flex-1 p-3 rounded-xl border border-outline-variant/30 bg-surface-container-low text-center cursor-pointer transition-all active:scale-95 hover:bg-surface-container" onclick="selectRole('developer', this)">
          <span class="material-symbols-outlined text-2xl text-secondary">code</span>
          <div class="text-xs font-medium text-on-surface mt-1">我是开发者</div>
        </div>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-on-surface-variant mb-1.5 font-mono uppercase tracking-wider">邮箱</label>
          <input type="email" id="login-email" placeholder="请输入邮箱" class="w-full px-4 py-3 bg-white/50 border border-white/60 rounded-xl text-sm text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all"/>
        </div>
        <div>
          <label class="block text-xs font-medium text-on-surface-variant mb-1.5 font-mono uppercase tracking-wider">密码</label>
          <input type="password" id="login-password" placeholder="请输入密码" class="w-full px-4 py-3 bg-white/50 border border-white/60 rounded-xl text-sm text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all"/>
        </div>
      </div>
      <button onclick="doLogin()" class="w-full mt-6 py-3 bg-primary text-on-primary rounded-full font-semibold text-sm active:scale-95 transition-all hover:shadow-lg hover:shadow-primary/20">登录</button>
    </div>
    <div id="register-form" style="display:none">
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-on-surface-variant mb-1.5 font-mono uppercase tracking-wider">用户名</label>
          <input type="text" id="reg-name" placeholder="请输入用户名" class="w-full px-4 py-3 bg-white/50 border border-white/60 rounded-xl text-sm text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all"/>
        </div>
        <div>
          <label class="block text-xs font-medium text-on-surface-variant mb-1.5 font-mono uppercase tracking-wider">邮箱</label>
          <input type="email" id="reg-email" placeholder="请输入邮箱" class="w-full px-4 py-3 bg-white/50 border border-white/60 rounded-xl text-sm text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all"/>
        </div>
        <div>
          <label class="block text-xs font-medium text-on-surface-variant mb-1.5 font-mono uppercase tracking-wider">密码</label>
          <input type="password" id="reg-password" placeholder="请输入密码" class="w-full px-4 py-3 bg-white/50 border border-white/60 rounded-xl text-sm text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all"/>
        </div>
      </div>
      <button onclick="doRegister()" class="w-full mt-6 py-3 bg-primary text-on-primary rounded-full font-semibold text-sm active:scale-95 transition-all hover:shadow-lg hover:shadow-primary/20">注册</button>
    </div>
    <div id="auth-error" class="text-center text-xs mt-4 min-h-5"></div>
  </div>
</div>

<!-- ═══════════ App Page ═══════════ -->
<div id="app-page" style="display:none" class="min-h-screen">
  <!-- TopAppBar -->
  <header class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-[40px] border-b border-white/50 shadow-[0_16px_32px_-12px_rgba(30,41,59,0.04)] flex justify-between items-center px-6 py-3">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-full bg-primary-container flex items-center justify-center">
        <span class="material-symbols-outlined text-on-primary-container text-lg">bolt</span>
      </div>
      <h1 class="font-display text-lg font-bold tracking-tight text-primary">AI Forge</h1>
    </div>
    <div class="flex items-center gap-3">
      <span id="user-role-badge"></span>
      <span id="user-name" class="text-sm text-on-surface-variant font-medium"></span>
    </div>
  </header>

  <main class="pt-20 pb-24 px-4 max-w-3xl mx-auto space-y-6">
    <!-- ─── Main View ─── -->
    <div id="main-view">
      <section class="space-y-4">
        <div class="flex items-center justify-between">
          <h2 id="view-title" class="font-display text-2xl font-bold text-on-surface">抢单大厅</h2>
          <button id="btn-create" onclick="showCreate()" class="flex items-center gap-2 px-4 py-2 bg-primary text-on-primary rounded-full text-sm font-semibold active:scale-95 transition-all hover:shadow-lg hover:shadow-primary/20">
            <span class="material-symbols-outlined text-sm">add</span>
            <span>创建新订单</span>
          </button>
        </div>
      </section>
      <div id="order-list" class="space-y-3 mt-4"></div>
    </div>

    <!-- ─── Create View ─── -->
    <div id="create-view" style="display:none" class="anim-slide-up">
      <div onclick="showMain()" class="flex items-center gap-1.5 text-on-surface-variant text-sm cursor-pointer mb-5 hover:text-on-surface transition-colors">
        <span class="material-symbols-outlined text-base">arrow_back</span>
        <span>返回</span>
      </div>
      <div class="glass-panel rounded-lg p-8 shadow-[0_16px_32px_-12px_rgba(30,41,59,0.08)]">
        <h2 class="font-display text-xl font-bold text-on-surface mb-6">创建新订单</h2>
        <div class="space-y-5">
          <div>
            <label class="block text-xs font-medium text-on-surface-variant mb-1.5 font-mono uppercase tracking-wider">用户是谁</label>
            <textarea id="order-userinfo" rows="2" placeholder="你的项目的目标用户是谁？" class="w-full px-4 py-3 bg-white/50 border border-white/60 rounded-xl text-sm text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all resize-none"></textarea>
          </div>
          <div>
            <label class="block text-xs font-medium text-on-surface-variant mb-1.5 font-mono uppercase tracking-wider">解决什么问题</label>
            <textarea id="order-problem" rows="3" placeholder="你的项目要解决什么问题？" class="w-full px-4 py-3 bg-white/50 border border-white/60 rounded-xl text-sm text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all resize-none"></textarea>
          </div>
          <div>
            <label class="block text-xs font-medium text-on-surface-variant mb-1.5 font-mono uppercase tracking-wider">核心功能（≤5）</label>
            <textarea id="order-features" rows="2" placeholder="列出核心功能点" class="w-full px-4 py-3 bg-white/50 border border-white/60 rounded-xl text-sm text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all resize-none"></textarea>
          </div>
          <div>
            <label class="block text-xs font-medium text-on-surface-variant mb-1.5 font-mono uppercase tracking-wider">不做什么</label>
            <textarea id="order-anti" rows="2" placeholder="明确不需要的功能" class="w-full px-4 py-3 bg-white/50 border border-white/60 rounded-xl text-sm text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all resize-none"></textarea>
          </div>
          <div>
            <label class="block text-xs font-medium text-on-surface-variant mb-1.5 font-mono uppercase tracking-wider">成功标准</label>
            <textarea id="order-success" rows="2" placeholder="怎样算完成" class="w-full px-4 py-3 bg-white/50 border border-white/60 rounded-xl text-sm text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all resize-none"></textarea>
          </div>
        </div>
        <div class="flex gap-3 mt-8">
          <button onclick="showMain()" class="px-6 py-2.5 rounded-full text-sm font-medium text-on-surface-variant glass-panel active:scale-95 transition-all">取消</button>
          <button onclick="submitOrder()" class="px-6 py-2.5 bg-primary text-on-primary rounded-full text-sm font-semibold active:scale-95 transition-all hover:shadow-lg hover:shadow-primary/20">提交订单</button>
        </div>
      </div>
    </div>

    <!-- ─── Detail View ─── -->
    <div id="detail-view" style="display:none" class="anim-slide-up space-y-4">
      <!-- ══ Page: Main Menu (3 options) ══ -->
      <div id="detail-page-menu" class="space-y-4">
        <div onclick="showMain()" class="flex items-center gap-1.5 text-on-surface-variant text-sm cursor-pointer hover:text-on-surface transition-colors">
          <span class="material-symbols-outlined text-base">arrow_back</span>
          <span>返回</span>
        </div>
        <div id="detail-menu" class="space-y-3"></div>
      </div>

      <!-- ══ Page: 订单详情 ══ -->
      <div id="detail-page-info" style="display:none" class="space-y-4">
        <div onclick="showDetailPage('menu')" class="flex items-center gap-1.5 text-on-surface-variant text-sm cursor-pointer hover:text-on-surface transition-colors">
          <span class="material-symbols-outlined text-base">arrow_back</span>
          <span>返回</span>
        </div>
        <div class="glass-panel rounded-lg p-6 shadow-[0_16px_32px_-12px_rgba(30,41,59,0.08)]">
          <div class="flex items-start justify-between mb-4">
            <h2 id="detail-title" class="font-display text-lg font-bold text-on-surface flex-1"></h2>
            <span id="detail-status" class="text-xs font-mono font-medium px-3 py-1 rounded-full shrink-0 ml-3"></span>
          </div>
          <div id="detail-developer" style="display:none" class="mb-3 text-xs text-on-surface-variant">
            接单开发者：<span id="detail-dev-name" class="font-medium text-on-surface"></span>
          </div>
          <div class="space-y-3">
            <div><div class="text-xs font-mono text-on-surface-variant uppercase tracking-wider mb-0.5">用户是谁</div><div id="detail-userinfo" class="text-sm text-on-surface leading-relaxed"></div></div>
            <div><div class="text-xs font-mono text-on-surface-variant uppercase tracking-wider mb-0.5">解决什么问题</div><div id="detail-problem" class="text-sm text-on-surface leading-relaxed"></div></div>
            <div><div class="text-xs font-mono text-on-surface-variant uppercase tracking-wider mb-0.5">核心功能</div><div id="detail-features" class="text-sm text-on-surface leading-relaxed"></div></div>
            <div><div class="text-xs font-mono text-on-surface-variant uppercase tracking-wider mb-0.5">不做什么</div><div id="detail-anti" class="text-sm text-on-surface leading-relaxed"></div></div>
            <div><div class="text-xs font-mono text-on-surface-variant uppercase tracking-wider mb-0.5">成功标准</div><div id="detail-success" class="text-sm text-on-surface leading-relaxed"></div></div>
            <div><div class="text-xs font-mono text-on-surface-variant uppercase tracking-wider mb-0.5">创建时间</div><div id="detail-time" class="text-sm text-on-surface"></div></div>
          </div>
        </div>
      </div>

      <!-- ══ Page: 开发进度 / 开发进度 ══ -->
      <div id="detail-page-flow" style="display:none" class="space-y-4">
        <div onclick="showDetailPage('menu')" class="flex items-center gap-1.5 text-on-surface-variant text-sm cursor-pointer hover:text-on-surface transition-colors">
          <span class="material-symbols-outlined text-base">arrow_back</span>
          <span>返回</span>
        </div>
        <div id="action-panel" class="glass-panel rounded-lg p-6 shadow-[0_16px_32px_-12px_rgba(30,41,59,0.08)]">
          <h3 class="font-display text-lg font-bold text-on-surface mb-4">开发进度</h3>
          <div id="action-buttons"></div>
        </div>
        <div id="buyer-progress-card" style="display:none" class="glass-panel rounded-lg p-6 shadow-[0_16px_32px_-12px_rgba(30,41,59,0.08)]">
          <h3 class="font-display text-lg font-bold text-on-surface mb-4">开发进度</h3>
          <div id="buyer-stage-progress"></div>
          <div id="buyer-stage-detail" class="space-y-4 mt-4"></div>
        </div>
      </div>

      <!-- ══ Page: 版本管理 (sub-menu) ══ -->
      <div id="detail-page-repo" style="display:none" class="space-y-4">
        <div onclick="showDetailPage('menu')" class="flex items-center gap-1.5 text-on-surface-variant text-sm cursor-pointer hover:text-on-surface transition-colors">
          <span class="material-symbols-outlined text-base">arrow_back</span>
          <span>返回</span>
        </div>
        <div id="repo-sub-menu" class="space-y-3">
          <div class="text-center py-6 text-sm text-outline">加载中...</div>
        </div>
      </div>

      <!-- ══ Page: 提交代码 ══ -->
      <div id="detail-page-repo-commit" style="display:none" class="space-y-4">
        <div onclick="showDetailPage('repo')" class="flex items-center gap-1.5 text-on-surface-variant text-sm cursor-pointer hover:text-on-surface transition-colors">
          <span class="material-symbols-outlined text-base">arrow_back</span>
          <span>返回</span>
        </div>
        <div id="repo-commit-form" class="glass-panel rounded-lg p-6 shadow-[0_16px_32px_-12px_rgba(30,41,59,0.08)]">
          <h3 class="font-display text-lg font-bold text-on-surface mb-4">提交代码</h3>
          <div id="commit-form"></div>
        </div>
      </div>

      <!-- ══ Page: 版本历史 ══ -->
      <div id="detail-page-repo-commits" style="display:none" class="space-y-4">
        <div onclick="showDetailPage('repo')" class="flex items-center gap-1.5 text-on-surface-variant text-sm cursor-pointer hover:text-on-surface transition-colors">
          <span class="material-symbols-outlined text-base">arrow_back</span>
          <span>返回</span>
        </div>
        <div id="repo-commits-list" class="glass-panel rounded-lg p-6 shadow-[0_16px_32px_-12px_rgba(30,41,59,0.08)]">
          <h3 class="font-display text-lg font-bold text-on-surface mb-4">版本历史</h3>
          <div id="repo-commits"></div>
        </div>
      </div>
    </div>

    <!-- ─── Profile View ─── -->
    <div id="profile-view" style="display:none" class="anim-slide-up space-y-5">
      <div class="glass-panel rounded-lg p-8 shadow-[0_16px_32px_-12px_rgba(30,41,59,0.08)]">
        <div class="flex items-center gap-4 mb-6">
          <div class="w-16 h-16 rounded-full bg-primary-container flex items-center justify-center">
            <span class="material-symbols-outlined text-3xl text-on-primary-container">person</span>
          </div>
          <div>
            <h2 id="profile-name" class="font-display text-xl font-bold text-on-surface"></h2>
            <span id="profile-role" class="text-xs font-mono font-medium px-2.5 py-0.5 rounded-full mt-1 inline-block"></span>
          </div>
        </div>
        <div class="border-t border-outline-variant/20 pt-6 mt-2">
          <button onclick="doLogout()" class="w-full py-3 bg-error-container text-on-error-container rounded-full text-sm font-semibold active:scale-95 transition-all flex items-center justify-center gap-2 hover:shadow-lg hover:shadow-red-500/10">
            <span class="material-symbols-outlined text-base">logout</span>
            退出登录
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- File Viewer Modal -->
  <div id="file-viewer" class="fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4" style="display:none" onclick="if(event.target===this)closeFileViewer()">
    <div class="bg-white rounded-xl w-full max-w-4xl max-h-[85vh] overflow-hidden shadow-2xl flex flex-col">
      <div class="flex items-center justify-between px-5 py-3 border-b border-outline-variant/20 bg-white">
        <span id="file-viewer-path" class="text-sm font-mono font-medium text-on-surface truncate"></span>
        <button onclick="closeFileViewer()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-surface-container transition-all">
          <span class="material-symbols-outlined text-sm">close</span>
        </button>
      </div>
      <div class="flex-1 flex overflow-hidden bg-[#1e1e2e]">
        <div class="select-none text-right px-3 py-4 text-xs font-mono text-[#585b70] leading-[1.65] border-r border-[#313244] overflow-hidden min-w-[3rem]">
          <pre id="file-viewer-lines" class="leading-[1.65] m-0">1</pre>
        </div>
        <div class="flex-1 overflow-auto" id="file-scroll-wrapper">
          <pre id="file-viewer-content" class="p-4 text-xs sm:text-sm font-mono text-[#cdd6f4] leading-[1.65] whitespace-pre m-0"></pre>
        </div>
      </div>
    </div>
  </div>

  <!-- BottomNavBar -->
  <nav class="fixed bottom-0 w-full z-50 bg-white/70 backdrop-blur-[40px] border-t border-white/50 shadow-[0_-8px_24px_-12px_rgba(30,41,59,0.04)] flex justify-around items-center px-4 py-1 max-w-3xl mx-auto">
    <button class="nav-btn flex flex-col items-center justify-center text-on-surface-variant p-1.5 hover:bg-secondary-container/20 rounded-xl transition-all active:scale-90" onclick="switchTab('hall', this)" id="nav-hall">
      <span class="material-symbols-outlined text-xl">storefront</span>
      <span class="nav-label text-[10px] mt-0.5">抢单大厅</span>
    </button>
    <button class="nav-btn flex flex-col items-center justify-center text-on-surface-variant p-1.5 hover:bg-secondary-container/20 rounded-xl transition-all active:scale-90" onclick="switchTab('mine', this)" id="nav-mine" style="display:none">
      <span class="material-symbols-outlined text-xl">folder_open</span>
      <span class="nav-label text-[10px] mt-0.5">我的订单</span>
    </button>
    <button class="nav-btn flex flex-col items-center justify-center text-on-surface-variant p-1.5 hover:bg-secondary-container/20 rounded-xl transition-all active:scale-90" onclick="switchTab('developer', this)" id="nav-developer" style="display:none">
      <span class="material-symbols-outlined text-xl">code</span>
      <span class="nav-label text-[10px] mt-0.5">我接的单</span>
    </button>
    <button class="nav-btn flex flex-col items-center justify-center text-on-surface-variant p-1.5 hover:bg-secondary-container/20 rounded-xl transition-all active:scale-90" onclick="showProfile()">
      <span class="material-symbols-outlined text-xl">person</span>
      <span class="nav-label text-[10px] mt-0.5">个人信息</span>
    </button>
  </nav>
</div>

<script>
const API = '';
let currentUser = null;
let currentTab = 'hall';
let currentOrderId = null;
let currentOrder = null;
let selectedRole = 'buyer';

async function api(method, path, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (currentUser?.sid) headers['Authorization'] = 'Bearer ' + currentUser.sid;
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  // 30 秒超时：防止服务端卡死时前端无限等待
  const controller = new AbortController();
  opts.signal = controller.signal;
  const timer = setTimeout(() => controller.abort(), 30000);
  try {
    const res = await fetch(API + path, opts);
    clearTimeout(timer);
    return res.json();
  } catch (err) {
    clearTimeout(timer);
    if (err.name === 'AbortError') {
      console.error('[API] 请求超时:', method, path);
      return { success: false, error: '请求超时，请检查服务端是否正常运行' };
    }
    console.error('[API] 网络错误:', err);
    return { success: false, error: '网络错误，请检查连接' };
  }
}

function selectRole(role, el) {
  selectedRole = role;
  document.querySelectorAll('.role-btn').forEach(b => {
    b.classList.remove('active','bg-primary/10','border-primary');
    b.classList.add('bg-surface-container-low','border-outline-variant/30');
  });
  el.classList.add('active','bg-primary/10','border-primary');
  el.classList.remove('bg-surface-container-low','border-outline-variant/30');
}

function switchAuthTab(tab, el) {
  document.querySelectorAll('.auth-tab').forEach(t => {
    t.classList.remove('bg-surface-container-low','text-on-surface','shadow-sm');
    t.classList.add('text-on-surface-variant');
  });
  if (el) {
    el.classList.add('bg-surface-container-low','text-on-surface','shadow-sm');
    el.classList.remove('text-on-surface-variant');
  }
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('auth-error').textContent = '';
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return showAuthError('请填写完整信息');
  const res = await api('POST', '/api/users/login', { email, password, role: selectedRole });
  if (!res.success) return showAuthError(res.error);
  currentUser = res.data;
  localStorage.setItem('sid', currentUser.sid);
  localStorage.setItem('userId', currentUser.id);
  localStorage.setItem('userName', currentUser.name);
  localStorage.setItem('userRole', currentUser.role);
  enterApp();
}

async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!name || !email || !password) return showAuthError('请填写完整信息');
  const res = await api('POST', '/api/users/register', { name, email, password });
  if (!res.success) return showAuthError(res.error);
  document.getElementById('auth-error').textContent = '注册成功，请登录';
  document.getElementById('auth-error').style.color = '#34c759';
  switchAuthTab('login');
  document.querySelectorAll('.auth-tab')[0].click();
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.style.color = '#ba1a1a';
  el.textContent = msg;
}

function doLogout() {
  currentUser = null;
  ['sid','userId','userName','userRole'].forEach(k => localStorage.removeItem(k));
  document.getElementById('auth-page').style.display = 'flex';
  document.getElementById('app-page').style.display = 'none';
}

function enterApp() {
  document.getElementById('auth-page').style.display = 'none';
  document.getElementById('app-page').style.display = 'block';
  document.getElementById('user-name').textContent = currentUser.name;
  const badge = document.getElementById('user-role-badge');
  if (currentUser.role === 'developer') {
    badge.innerHTML = '<span class="text-xs font-mono font-medium px-2.5 py-0.5 rounded-full bg-secondary/10 text-secondary">开发者</span>';
  } else {
    badge.innerHTML = '<span class="text-xs font-mono font-medium px-2.5 py-0.5 rounded-full bg-primary/10 text-primary">买家</span>';
  }
  renderNav();
  showMain();
}

function renderNav() {
  const createBtn = document.getElementById('btn-create');
  const navMine = document.getElementById('nav-mine');
  const navDev = document.getElementById('nav-developer');
  if (currentUser.role === 'developer') {
    createBtn.style.display = 'none';
    navMine.style.display = 'none';
    navDev.style.display = '';
  } else {
    createBtn.style.display = '';
    navMine.style.display = '';
    navDev.style.display = 'none';
  }
  // 高亮当前的底部导航按钮
  const tabMap = { hall: 'nav-hall', mine: 'nav-mine', developer: 'nav-developer' };
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.remove('text-primary');
    b.querySelector('.nav-label')?.classList.remove('font-medium');
  });
  const activeBtn = document.getElementById(tabMap[currentTab]);
  if (activeBtn) {
    activeBtn.classList.add('text-primary');
    activeBtn.querySelector('.nav-label')?.classList.add('font-medium');
  }
}

function showMain() {
  document.getElementById('main-view').style.display = 'block';
  document.getElementById('create-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('profile-view').style.display = 'none';
  currentOrderId = null;
  currentOrder = null;
  loadOrders();
}

function showCreate() {
  // 开发者不能创建订单
  if (currentUser?.role === 'developer') {
    showMain();
    return;
  }
  document.getElementById('main-view').style.display = 'none';
  document.getElementById('create-view').style.display = 'block';
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('profile-view').style.display = 'none';
  ['order-userinfo','order-problem','order-features','order-anti','order-success'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

function showDetail(orderId) {
  document.getElementById('main-view').style.display = 'none';
  document.getElementById('create-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  document.getElementById('profile-view').style.display = 'none';
  currentOrderId = orderId;
  loadOrderDetail(orderId);
}

function switchTab(tab, el) {
  currentTab = tab;
  // 切换到主视图（从详情/个人信息页返回）
  document.getElementById('main-view').style.display = 'block';
  document.getElementById('create-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('profile-view').style.display = 'none';
  // 高亮底部导航按钮
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.remove('text-primary');
    const label = b.querySelector('.nav-label');
    if (label) label.classList.remove('font-medium');
  });
  if (el) {
    el.classList.add('text-primary');
    const label = el.querySelector('.nav-label');
    if (label) label.classList.add('font-medium');
  }
  const titles = { hall: '抢单大厅', mine: '我的订单', developer: '我接的单' };
  document.getElementById('view-title').textContent = titles[tab] || '';
  loadOrders();
}

function showProfile() {
  document.getElementById('main-view').style.display = 'none';
  document.getElementById('create-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('profile-view').style.display = 'block';
  document.getElementById('view-title').textContent = '个人信息';
  document.getElementById('profile-name').textContent = currentUser.name;
  const roleEl = document.getElementById('profile-role');
  if (currentUser.role === 'developer') {
    roleEl.textContent = '开发者';
    roleEl.className = 'text-xs font-mono font-medium px-2.5 py-0.5 rounded-full bg-secondary/10 text-secondary';
  } else {
    roleEl.textContent = '买家';
    roleEl.className = 'text-xs font-mono font-medium px-2.5 py-0.5 rounded-full bg-primary/10 text-primary';
  }
  // 取消所有底部导航的高亮
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.remove('text-primary');
    const label = b.querySelector('.nav-label');
    if (label) label.classList.remove('font-medium');
  });
}

async function loadOrders() {
  const paths = { hall: '/api/orders/hall', mine: '/api/orders/mine', developer: '/api/orders/developer' };
  const res = await api('GET', paths[currentTab]);
  const list = document.getElementById('order-list');
  if (!res.success || !res.data.length) {
    const msgs = { hall: '大厅暂无订单', mine: '你还没有创建过订单', developer: '你还没有接过单' };
    const icons = { hall: 'inbox', mine: 'note_add', developer: 'code_off' };
    list.innerHTML = `<div class="text-center py-16 text-on-surface-variant">
      <span class="material-symbols-outlined text-5xl text-outline-variant mb-3 block">${icons[currentTab]}</span>
      <p class="text-sm">${msgs[currentTab]}</p>
    </div>`;
    return;
  }
  list.innerHTML = res.data.map(o => `
    <div class="glass-panel p-5 rounded-lg cursor-pointer active:scale-[0.98] transition-all hover:shadow-[0_8px_24px_-8px_rgba(30,41,59,0.12)]" onclick="showDetail('${o.id}')">
      <div class="flex items-start justify-between mb-2">
        <div class="font-semibold text-on-surface flex-1">${esc(o.title)}</div>
        <span class="status-pill text-xs font-mono font-medium px-3 py-0.5 rounded-full shrink-0 ml-3" data-status="${o.status}">${statusText(o.status)}</span>
      </div>
      <p class="text-sm text-on-surface-variant leading-relaxed line-clamp-2 mb-3">${esc(o.problem || o.description)}</p>
      <div class="flex items-center justify-between text-xs text-outline">
        <span>${esc(o.userInfo ? o.userInfo.slice(0, 30) : '')}</span>
        <span>${formatTime(o.createdAt)}</span>
      </div>
    </div>
  `).join('');
  document.querySelectorAll('.status-pill').forEach(el => {
    const s = el.dataset.status;
    const colors = {
      pending: 'bg-amber-50 text-amber-700',
      claimed: 'bg-blue-50 text-blue-700',
      in_progress: 'bg-purple-50 text-purple-700',
      reviewing: 'bg-yellow-50 text-yellow-700',
      completed: 'bg-green-50 text-green-700',
      cancelled: 'bg-red-50 text-red-700',
    };
    el.classList.add(colors[s] || 'bg-gray-100 text-gray-600');
  });
}

async function submitOrder() {
  const problem = document.getElementById('order-problem').value.trim();
  if (!problem) return alert('请填写解决什么问题');
  const res = await api('POST', '/api/orders', {
    title: problem.slice(0, 50),
    description: problem,
    userInfo: document.getElementById('order-userinfo').value.trim() || null,
    problem,
    features: document.getElementById('order-features').value.trim() || null,
    antiFeatures: document.getElementById('order-anti').value.trim() || null,
    successCriteria: document.getElementById('order-success').value.trim() || null,
  });
  if (!res.success) return alert(res.error);
  showMain();
}

async function loadOrderDetail(orderId) {
  const res = await api('GET', '/api/orders/' + orderId);
  if (!res.success) return alert(res.error);
  const o = res.data.order;
  currentOrder = o;
  document.getElementById('detail-title').textContent = o.title;
  const statusEl = document.getElementById('detail-status');
  statusEl.textContent = statusText(o.status);
  statusEl.className = 'text-xs font-mono font-medium px-3 py-1 rounded-full';
  const sColors = { pending:'bg-amber-50 text-amber-700', claimed:'bg-blue-50 text-blue-700', in_progress:'bg-purple-50 text-purple-700', reviewing:'bg-yellow-50 text-yellow-700', completed:'bg-green-50 text-green-700', cancelled:'bg-red-50 text-red-700' };
  statusEl.classList.add(...(sColors[o.status] || 'bg-gray-100 text-gray-600').split(' '));
  document.getElementById('detail-userinfo').textContent = o.userInfo || '未填写';
  document.getElementById('detail-problem').textContent = o.problem || '未填写';
  document.getElementById('detail-features').textContent = o.features || '未填写';
  document.getElementById('detail-anti').textContent = o.antiFeatures || '未填写';
  document.getElementById('detail-success').textContent = o.successCriteria || '未填写';
  document.getElementById('detail-time').textContent = formatTime(o.createdAt);
  const devEl = document.getElementById('detail-developer');
  if (o.developerId) { devEl.style.display = ''; document.getElementById('detail-dev-name').textContent = o.developerName || o.developerId; }
  else { devEl.style.display = 'none'; }
  renderDetailMenu(o);
  renderActionPanel(o);
  if (currentUser.role !== 'developer') loadBuyerProgress(o);
  loadRepoInfo(orderId);
  showDetailPage('menu');
}

function renderDetailMenu(order) {
  const menuEl = document.getElementById('detail-menu');
  const isDev = currentUser.role === 'developer';
  const hasFlow = isDev || (order.developerId && !isDev);
  const hasRepo = isDev && order.developerId === currentUser.id;

  const items = [
    { key: 'info', label: '订单详情', icon: 'description', show: true },
    { key: 'flow', label: isDev ? '开发进度' : '开发进度', icon: isDev ? 'sync_alt' : 'progress_activity', show: hasFlow },
    { key: 'repo', label: '版本管理', icon: 'folder_open', show: hasRepo },
  ];

  menuEl.innerHTML = items.filter(i => i.show).map(item => `
    <div onclick="showDetailPage('${item.key}')" class="glass-panel p-4 rounded-lg cursor-pointer active:scale-[0.98] transition-all hover:shadow-[0_4px_16px_-8px_rgba(30,41,59,0.1)] flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-primary/10 flex items-center justify-center">
        <span class="material-symbols-outlined text-primary">${item.icon}</span>
      </div>
      <div>
        <div class="font-semibold text-on-surface text-sm">${item.label}</div>
      </div>
      <span class="material-symbols-outlined ml-auto text-on-surface-variant">chevron_right</span>
    </div>
  `).join('');
}

function showDetailPage(page) {
  // 所有 detail-page-* 隐藏
  const pages = ['detail-page-menu', 'detail-page-info', 'detail-page-flow', 'detail-page-repo', 'detail-page-repo-commit', 'detail-page-repo-commits'];
  pages.forEach(p => { const el = document.getElementById(p); if (el) el.style.display = 'none'; });
  const target = document.getElementById('detail-page-' + page);
  if (target) target.style.display = '';
  // 进入提交代码页面时渲染表单
  if (page === 'repo-commit') renderCommitForm();
  // 进入版本历史页面时加载数据
  if (page === 'repo-commits' && currentOrderId) loadCommits(currentOrderId);
}

function renderActionPanel(order) {
  const panel = document.getElementById('action-panel');
  const buttons = document.getElementById('action-buttons');
  if (currentUser.role !== 'developer') { panel.style.display = 'none'; return; }
  panel.style.display = '';
  if (order.status === 'pending') {
    buttons.innerHTML = '<button onclick="claimOrder()" class="px-5 py-2.5 bg-primary text-on-primary rounded-full text-sm font-semibold active:scale-95 transition-all hover:shadow-lg hover:shadow-primary/20">接此订单</button>';
    return;
  }
  if (order.developerId !== currentUser.id) {
    buttons.innerHTML = '<span class="text-sm text-outline">已被其他开发者接单</span>';
    return;
  }
  loadStages(order.id);
}

const STAGE_CONFIG = [
  { key:'requirement', name:'需求分析', color:'text-green-600', bg:'bg-green-50', desc:'明确要做什么产品、给谁用、解决什么问题', completeBtn:'完成需求分析',
    fields: [
      { label:'1. 产品名称', placeholder:'XXX系统' }, { label:'2. 产品目标', placeholder:'解决什么问题' },
      { label:'3. 用户群体', placeholder:'谁会用' }, { label:'4. 核心问题', placeholder:'用户痛点是什么' },
      { label:'5. 核心功能范围（MVP）', placeholder:'功能1\n功能2\n功能3' }, { label:'6. 非目标（不做什么）', placeholder:'不做移动端' },
      { label:'7. 成功标准', placeholder:'能正常运行' },
    ]},
  { key:'design', name:'系统设计', color:'text-amber-600', bg:'bg-amber-50', desc:'把需求变成工程蓝图：模块拆分、数据库设计、API设计', completeBtn:'完成系统设计',
    fields: [{ label:'模块拆分', placeholder:'系统包含哪些模块？' }, { label:'数据库设计', placeholder:'需要哪些表？' }, { label:'API设计', placeholder:'需要哪些接口？' }, { label:'页面结构', placeholder:'有哪些页面？' }]},
  { key:'techstack', name:'技术选型', color:'text-orange-600', bg:'bg-orange-50', desc:'决定用什么工具做：前端、后端、数据库、部署', completeBtn:'完成技术选型',
    fields: [{ label:'前端技术', placeholder:'React / Vue？' }, { label:'后端技术', placeholder:'Node / Python？' }, { label:'数据库', placeholder:'MySQL / SQLite？' }, { label:'部署方案', placeholder:'Vercel / Docker？' }]},
  { key:'implementation', name:'开发阶段', color:'text-blue-600', bg:'bg-blue-50', desc:'真正写代码，按模块逐步开发', completeBtn:'完成开发阶段',
    fields: [{ label:'开发计划', placeholder:'按什么顺序开发？' }, { label:'当前进度', placeholder:'完成了哪些？' }, { label:'技术难点', placeholder:'遇到了什么问题？' }, { label:'代码结构', placeholder:'目录结构？' }]},
  { key:'testing', name:'测试阶段', color:'text-purple-600', bg:'bg-purple-50', desc:'检查系统是否可用：单元测试、集成测试', completeBtn:'完成测试阶段',
    fields: [{ label:'测试类型', placeholder:'做了哪些测试？' }, { label:'测试结果', placeholder:'通过了吗？' }, { label:'边界情况', placeholder:'边界情况？' }, { label:'Bug列表', placeholder:'发现了哪些bug？' }]},
];

let currentStages = [];

async function loadStages(orderId) {
  const res = await api('GET', '/api/orders/' + orderId + '/stages');
  if (!res.success) return;
  currentStages = res.data || [];
  renderStages();
}

function renderStages() {
  const buttons = document.getElementById('action-buttons');
  if (typeof window._devActiveIdx === 'undefined') window._devActiveIdx = -1;

  // ── 计算可访问的最大阶段索引 ─────────────────────────
  // 已完成/进行中的阶段 + 第一个待开始的阶段可点击，后续的锁定
  let maxAccessibleIdx = -1;
  for (let i = 0; i < STAGE_CONFIG.length; i++) {
    const s = currentStages.find(x => x.stage === STAGE_CONFIG[i].key);
    if (!s || s.status === 'pending') {
      maxAccessibleIdx = i; // 第一个未开始的阶段也可访问（即将要做的）
      break;
    }
    maxAccessibleIdx = i; // 已完成或进行中的阶段
  }
  if (maxAccessibleIdx < 0) maxAccessibleIdx = STAGE_CONFIG.length - 1;

  // ── 渲染圆点 ────────────────────────────────────────
  let html = '<div id="dev-stage-area" class="flex gap-1 mb-6 overflow-x-auto no-scrollbar">';
  STAGE_CONFIG.forEach((cfg, i) => {
    const stage = currentStages.find(s => s.stage === cfg.key);
    const status = stage ? stage.status : 'pending';
    const locked = i > maxAccessibleIdx;
    const dotClass = locked ? 'bg-gray-100 text-gray-300 border-gray-200' :
                     status === 'completed' ? 'bg-green-500 text-white border-green-500' :
                     status === 'in_progress' ? 'bg-primary text-white border-primary shadow-[0_0_0_4px_rgba(183,0,79,0.15)]' :
                     'bg-surface-container text-outline border-outline-variant/50';
    const labelClass = locked ? 'text-gray-300' :
                       status === 'completed' ? 'text-green-600' :
                       status === 'in_progress' ? 'text-primary' : 'text-outline';
    html += `<div class="flex-1 text-center min-w-[60px] ${locked ? '' : 'cursor-pointer active:scale-95 transition-transform'}" ${locked ? '' : `onclick="switchDevStage(${i})"`}>
      <div class="w-8 h-8 rounded-full border-2 flex items-center justify-center mx-auto mb-1.5 text-xs font-bold transition-all ${dotClass}">
        ${locked ? '<span class="material-symbols-outlined text-sm">lock</span>' : status === 'completed' ? '<span class="material-symbols-outlined text-sm">check</span>' : (i+1)}
      </div>
      <div class="text-[10px] font-medium ${labelClass}">${cfg.name}</div>
    </div>`;
  });
  html += '</div>';

  // ── 确定当前选中阶段 ────────────────────────────────
  let activeIdx = window._devActiveIdx;
  if (activeIdx < 0 || activeIdx > maxAccessibleIdx) {
    // 默认选中第一个非完成的可访问阶段
    activeIdx = STAGE_CONFIG.findIndex(cfg => {
      const s = currentStages.find(x => x.stage === cfg.key);
      return s && s.status !== 'completed';
    });
    if (activeIdx < 0 || activeIdx > maxAccessibleIdx) activeIdx = 0;
  }
  window._devActiveIdx = activeIdx;

  const cfg = STAGE_CONFIG[activeIdx];
  const stage = currentStages.find(s => s.stage === cfg.key);
  let savedContent = {};
  try { savedContent = stage?.content ? JSON.parse(stage.content) : {}; } catch(e) {}

  html += `<div class="bg-white/30 rounded-xl p-5 border border-white/40">
    <div class="flex items-center gap-2 mb-1">
      <span class="text-sm font-bold text-on-surface">${cfg.name}</span>
      <span class="text-[10px] font-mono px-2 py-0.5 rounded-full ${stage?.status === 'completed' ? 'bg-green-50 text-green-600' : stage?.status === 'in_progress' ? 'bg-blue-50 text-blue-600' : 'bg-gray-100 text-gray-500'}">${stage?.status === 'completed' ? '已完成' : stage?.status === 'in_progress' ? '进行中' : '待开始'}</span>
    </div>
    <p class="text-xs text-on-surface-variant mb-4">${cfg.desc}</p>`;

  cfg.fields.forEach((f, i) => {
    html += `<div class="mb-3">
      <label class="block text-xs font-medium text-on-surface-variant mb-1">${f.label}</label>
      <textarea id="field-${cfg.key}-${i}" rows="2" placeholder="${f.placeholder}" class="w-full px-3 py-2 bg-white/50 border border-white/60 rounded-xl text-sm text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all resize-none">${esc(savedContent[f.label] || '')}</textarea>
    </div>`;
  });

  html += `<div class="flex gap-2 mt-4">
    <button onclick="saveStage('${cfg.key}')" class="px-4 py-2 bg-surface-container text-on-surface rounded-full text-xs font-medium active:scale-95 transition-all">${stage?.status === 'completed' ? '保存修改' : '保存'}</button>

async function saveStage(stageKey) {
  const cfg = STAGE_CONFIG.find(c => c.key === stageKey);
  const content = {};
  cfg.fields.forEach((f, i) => {
    const el = document.getElementById(`field-${stageKey}-${i}`);
    if (el) content[f.label] = el.value.trim();
  });
  if (!Object.values(content).some(v => v)) return alert('请至少填写一项内容');
  const res = await api('PUT', '/api/orders/' + currentOrderId + '/stages/' + stageKey, { content: JSON.stringify(content) });
  if (!res.success) return alert(res.error);
  loadStages(currentOrderId);
}

async function completeStage(stageKey) {
  const cfg = STAGE_CONFIG.find(c => c.key === stageKey);
  const content = {};
  cfg.fields.forEach((f, i) => {
    const el = document.getElementById(`field-${stageKey}-${i}`);
    if (el) content[f.label] = el.value.trim();
  });
  if (!Object.values(content).some(v => v)) return alert('请先填写内容');
  const res = await api('PUT', '/api/orders/' + currentOrderId + '/stages/' + stageKey, { content: JSON.stringify(content) });

async function loadBuyerProgress(order) {
  const card = document.getElementById('buyer-stage-progress');
  const detail = document.getElementById('buyer-stage-detail');
  const cardEl = document.getElementById('buyer-progress-card');
  if (!order.developerId) { cardEl.style.display = 'none'; return; }
  const res = await api('GET', '/api/orders/' + order.id + '/stages');
  if (!res.success || !res.data.length) { cardEl.style.display = 'none'; return; }
  cardEl.style.display = '';
  const stages = res.data;

  // 找到第一个有内容的阶段作为默认选中
  let activeIdx = 0;
  for (let i = 0; i < STAGE_CONFIG.length; i++) {
    const s = stages.find(x => x.stage === STAGE_CONFIG[i].key);
    if (s && s.status !== 'pending') { activeIdx = i; break; }
  }

  const stageDots = STAGE_CONFIG.map((cfg, i) => {
    const stage = stages.find(s => s.stage === cfg.key);
    const status = stage ? stage.status : 'pending';
    const dotClass = status === 'completed' ? 'bg-green-500 text-white border-green-500' :
                     status === 'in_progress' ? 'bg-primary text-white border-primary shadow-[0_0_0_4px_rgba(183,0,79,0.15)]' :
                     'bg-surface-container text-outline border-outline-variant/50';
    return `<div class="flex-1 text-center min-w-[60px] cursor-pointer active:scale-95 transition-transform" onclick="switchBuyerStage(${i})">
      <div class="w-8 h-8 rounded-full border-2 flex items-center justify-center mx-auto mb-1.5 text-xs font-bold transition-all ${dotClass}">
        ${status === 'completed' ? '<span class="material-symbols-outlined text-sm">check</span>' : (i+1)}
      </div>
      <div class="text-[10px] font-medium ${status === 'completed' ? 'text-green-600' : status === 'in_progress' ? 'text-primary' : 'text-outline'}">${cfg.name}</div>
    </div>`;
  });
  card.innerHTML = '<div class="flex gap-1 mb-4 overflow-x-auto no-scrollbar">' + stageDots.join('') + '</div>';

  // 保存 stages 数据，供切换时使用
  card.dataset.activeIdx = activeIdx;
  window._buyerStages = stages;
  renderBuyerStageDetail(activeIdx);
}

function renderBuyerStageDetail(idx) {
  const cfg = STAGE_CONFIG[idx];

      <span class="text-[10px] font-mono px-2 py-0.5 rounded-full ${stage.status === 'completed' ? 'bg-green-50 text-green-600' : 'bg-blue-50 text-blue-600'}">${stage.status === 'completed' ? '已完成' : '进行中'}</span>

function handleFilePicked(input) {
  const files = input.files;
  if (!files || !files.length) return;
  for (const file of files) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const content = e.target.result;
      addCommitFileEntry(file.name, content);
    };
    reader.readAsText(file);
  }
  input.value = '';
}

function handleFolderPicked(input) {
  const files = input.files;
  if (!files || !files.length) return;

  // 提示用户
  const msgEl = document.getElementById('commit-error');
  msgEl.style.color = '#2563eb';
  msgEl.textContent = '⏳ 正在读取文件（跳过 node_modules、.git 等目录）...';

  // 跳过常见的大型/无关目录
  const skipDirs = ['node_modules', '.git', '.mimocode', '.claude', 'dist', '.next', 'build', 'target', '__pycache__', '.vscode', 'vendor', '.DS_Store'];
  const skipSuffix = ['.png', '.jpg', '.jpeg', '.gif', '.ico', '.svg', '.woff', '.woff2', '.eot', '.ttf', '.map'];

  const sorted = Array.from(files)
    .filter(f => {
      const p = f.webkitRelativePath.replace(/\\/g, '/');
      // 跳过黑名单目录中的文件
      for (const dir of skipDirs) {
        if (p.includes('/' + dir + '/') || p.startsWith(dir + '/')) return false;
      }
      // 跳过二进制/大文件后缀
      for (const ext of skipSuffix) {
        if (p.endsWith(ext)) return false;
      }
      return true;
    })
    .sort((a, b) => a.webkitRelativePath.localeCompare(b.webkitRelativePath));

  if (sorted.length === 0) {
    msgEl.textContent = '⚠️ 所选文件夹中没有可读的代码文件';
    input.value = '';
    return;
  }

  msgEl.textContent = '⏳ 正在读取 ' + sorted.length + ' 个文件...';

  // 分批处理，避免卡死 UI
  let index = 0;
  function readNextBatch() {
    const batchSize = 5;
    const end = Math.min(index + batchSize, sorted.length);
    let completed = 0;
    for (let i = index; i < end; i++) {
      const file = sorted[i];
      const reader = new FileReader();
      reader.onload = function(e) {
        addCommitFileEntry(file.webkitRelativePath.replace(/\\/g, '/'), e.target.result);
        completed++;
        if (i + completed >= end) {
          index = end;
          if (index < sorted.length) {
            msgEl.textContent = '⏳ 正在读取... (' + index + '/' + sorted.length + ')';
            setTimeout(readNextBatch, 50);
          } else {
            msgEl.textContent = '✅ 已加载 ' + sorted.length + ' 个文件';
            setTimeout(() => { msgEl.textContent = ''; }, 3000);
          }
        }
      };
      reader.readAsText(file);
    }
  }
  readNextBatch();
  input.value = '';
}

function addCommitFileEntry(path, content) {
  const container = document.getElementById('commit-files');
  container.style.display = ''; // 显示文件列表容器
  const idx = commitFileCount++;
  const div = document.createElement('div');
  div.className = 'p-3 bg-white/30 rounded-xl border border-white/40';
  div.id = 'commit-file-' + idx;
  div.innerHTML = `
    <div class="flex items-center gap-2 mb-1.5">
      <span class="flex-1 text-xs font-mono text-on-surface truncate" title="${esc(path || '')}">
        <span class="material-symbols-outlined text-sm align-middle -ml-0.5 text-outline" style="font-size:14px">description</span>

      </span>
      <button onclick="this.closest('.p-3').remove()" class="w-6 h-6 flex items-center justify-center rounded-full text-outline hover:text-red-500 hover:bg-red-50 transition-all">
        <span class="material-symbols-outlined text-sm">close</span>
      </button>
    </div>

  `;
  container.appendChild(div);
}

async function submitCommit() {
  const message = document.getElementById('commit-message').value.trim();
  if (!message) return showCommitError('请填写代码版本名称');

  const fileEntries = document.querySelectorAll('[id^="commit-file-"]');
  const files = [];
  for (const entry of fileEntries) {
    const idx = entry.id.replace('commit-file-', '');
    const pathSpan = entry.querySelector('.cf-path-text');
    const contentEl = document.getElementById('cf-content-' + idx);
    const path = pathSpan ? pathSpan.textContent.trim() : '';
    if (path && contentEl) {
      files.push({ path, content: contentEl.value });
    }
  }
  if (!files.length) return showCommitError('请至少添加一个文件');

  const btn = document.querySelector('#commit-form button:last-of-type');
  const origText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-outlined text-base align-middle mr-1">hourglass_top</span> 提交中...';

  const description = document.getElementById('commit-description').value.trim();
  const payload = { message, files };
  if (description) payload.description = description;

  const res = await api('POST', '/api/repos/' + currentOrderId + '/commit', payload);
  btn.disabled = false;
  btn.innerHTML = origText;
  if (!res.success) return showCommitError(res.error || '提交失败');

  // 成功
  document.getElementById('commit-error').textContent = '';
  document.getElementById('commit-error').style.color = '';
  alert('✅ 已创建 ' + res.data.ref + '：' + res.data.message);
  // 清空表单
  renderCommitForm();
  // 刷新版本历史
  loadRepoInfo(currentOrderId);
}

async function toggleVersion(ref) {

      const tree = buildFileTree(res.data.files);
      filesEl.innerHTML = '<div class="divide-y divide-outline-variant/10">' + renderTreeNodes(tree, 0, ref) + '</div>';
    } else {
      filesEl.innerHTML = '<div class="text-center py-4 text-sm text-outline">该版本没有文件</div>';

function renameCommit(ref) {
  const commit = repoCommits.find(c => c.ref === ref);
  if (!commit) return;
  const newName = prompt('修改版本名称：', commit.message);
  if (!newName || newName.trim() === commit.message) return;
  api('PUT', '/api/repos/' + currentOrderId + '/commits/' + ref, { message: newName.trim() }).then(res => {
    if (!res.success) return alert('修改失败: ' + (res.error || '未知错误'));
    loadCommits(currentOrderId);
  });
}

function buildFileTree(files) {
  const root = { name: '/', dirs: {}, files: [] };
  for (const f of files) {
    const parts = f.path.replace(/\\/g, '/').split('/');
    let node = root;
    for (let i = 0; i < parts.length - 1; i++) {
      if (!node.dirs[parts[i]]) {
        node.dirs[parts[i]] = { name: parts[i], dirs: {}, files: [] };
      }
      node = node.dirs[parts[i]];
    }
    node.files.push(f);
  }
  return root;
}

function renderTreeNodes(node, depth, ref) {
  let html = '';
  const indent = 12 + depth * 20;

  const dirNames = Object.keys(node.dirs).sort();
  const fileList = [...node.files].sort((a, b) => a.path.localeCompare(b.path));

  for (const name of dirNames) {
    const dir = node.dirs[name];
    const childCount = Object.keys(dir.dirs).length + dir.files.length;
    html += `<div class="tree-folder-row" data-depth="${depth}">
      <div class="flex items-center gap-2 py-2 px-3 hover:bg-white/40 cursor-pointer transition-all text-xs select-none" style="padding-left:${indent}px" onclick="event.stopPropagation();toggleTreeDir(this)">
        <span class="material-symbols-outlined text-sm text-amber-500 tree-icon">folder</span>
        <span class="text-on-surface font-medium">${esc(name)}</span>
        <span class="text-outline text-[10px] ml-auto">${childCount} 项</span>
      </div>
      <div class="tree-children hidden">
        ${renderTreeNodes(dir, depth + 1, ref)}
      </div>
    </div>`;
  }

  for (const f of fileList) {
    const icon = f.action === 'delete' ? 'delete' : 'description';
    const iconColor = f.action === 'delete' ? 'text-red-400' : 'text-blue-400';
    const fileName = f.path.replace(/\\/g, '/').split('/').pop();
    const safePath = f.path.replace(/'/g, "\\'");
    const clickAttr = ref ? `onclick="event.stopPropagation();showFileContent('${safePath}', '${ref}')"` : '';
    html += `<div class="flex items-center gap-2 py-2 px-3 hover:bg-white/40 transition-all text-xs ${ref ? 'cursor-pointer' : ''}" style="padding-left:${indent}px" ${clickAttr}>
      <span class="material-symbols-outlined text-sm ${iconColor}">${icon}</span>
      <span class="text-on-surface font-mono flex-1 truncate" title="${esc(f.path)}">${esc(fileName)}</span>
      <span class="text-outline text-[10px]">${f.size ? formatBytes(f.size) : ''}</span>
    </div>`;
  }

  return html;
}

function toggleTreeDir(el) {
  const children = el.nextElementSibling;
  if (children && children.classList.contains('tree-children')) {
    const isHidden = children.classList.contains('hidden');
    children.classList.toggle('hidden');
    const icon = el.querySelector('.tree-icon');
    if (icon) icon.textContent = isHidden ? 'folder_open' : 'folder';
  }
}

function formatBytes(bytes) {
  if (!bytes || bytes === 0) return '0 B';
  const units = ['B', 'KB', 'MB'];
  const i = Math.floor(Math.log(bytes) / Math.log(1024));
  return (bytes / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
}

function closeFileViewer() {
  document.getElementById('file-viewer').style.display = 'none';
}

async function showFileContent(path, ref) {
  const viewer = document.getElementById('file-viewer');
  document.getElementById('file-viewer-path').textContent = path;
  document.getElementById('file-viewer-content').textContent = '加载中...';
  document.getElementById('file-viewer-lines').textContent = '1';
  viewer.style.display = 'flex';
  const res = await api('GET', '/api/repos/' + currentOrderId + '/file?path=' + encodeURIComponent(path) + '&ref=' + encodeURIComponent(ref));
  if (res.success && res.data?.content) {
    const lines = res.data.content.split('\n');
    document.getElementById('file-viewer-content').textContent = res.data.content;
    document.getElementById('file-viewer-lines').textContent = lines.map((_, i) => i + 1).join('\n');
    // 同步滚动：代码滚动时行号跟随
    const wrapper = document.getElementById('file-scroll-wrapper');
    const lineNumbers = document.getElementById('file-viewer-lines');
    wrapper.onscroll = () => { lineNumbers.parentElement.scrollTop = wrapper.scrollTop; };
  } else {
    document.getElementById('file-viewer-content').textContent = '// 无法加载文件内容';
    document.getElementById('file-viewer-lines').textContent = '1';
  }
}

(function init() {
  const sid = localStorage.getItem('sid');
  const id = localStorage.getItem('userId');
  const name = localStorage.getItem('userName');
  const role = localStorage.getItem('userRole');
  if (sid) { currentUser = { sid, id, name, role }; enterApp(); }
})();
</script>
