<script>
const API = '';
let currentUser = null;
let currentTab = 'hall';
let currentOrderId = null;
let currentOrder = null;
let selectedRole = 'buyer';

async function api(method, path, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (currentUser?.sid) headers['Authorization'] = 'Bearer ' + currentUser.sid;
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  // 30 秒超时：防止服务端卡死时前端无限等待
  const controller = new AbortController();
  opts.signal = controller.signal;
  const timer = setTimeout(() => controller.abort(), 30000);
  try {
    const res = await fetch(API + path, opts);
    clearTimeout(timer);
    return res.json();
  } catch (err) {
    clearTimeout(timer);
    if (err.name === 'AbortError') {
      console.error('[API] 请求超时:', method, path);
      return { success: false, error: '请求超时，请检查服务端是否正常运行' };
    }
    console.error('[API] 网络错误:', err);
    return { success: false, error: '网络错误，请检查连接' };
  }
}

function selectRole(role, el) {
  selectedRole = role;
  document.querySelectorAll('.role-btn').forEach(b => {
    b.classList.remove('active','bg-primary/10','border-primary');
    b.classList.add('bg-surface-container-low','border-outline-variant/30');
  });
  el.classList.add('active','bg-primary/10','border-primary');
  el.classList.remove('bg-surface-container-low','border-outline-variant/30');
}

function switchAuthTab(tab, el) {
  document.querySelectorAll('.auth-tab').forEach(t => {
    t.classList.remove('bg-surface-container-low','text-on-surface','shadow-sm');
    t.classList.add('text-on-surface-variant');
  });
  if (el) {
    el.classList.add('bg-surface-container-low','text-on-surface','shadow-sm');
    el.classList.remove('text-on-surface-variant');
  }
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('auth-error').textContent = '';
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return showAuthError('请填写完整信息');
  const res = await api('POST', '/api/users/login', { email, password, role: selectedRole });
  if (!res.success) return showAuthError(res.error);
  currentUser = res.data;
  localStorage.setItem('sid', currentUser.sid);
  localStorage.setItem('userId', currentUser.id);
  localStorage.setItem('userName', currentUser.name);
  localStorage.setItem('userRole', currentUser.role);
  enterApp();
}

async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!name || !email || !password) return showAuthError('请填写完整信息');
  const res = await api('POST', '/api/users/register', { name, email, password });
  if (!res.success) return showAuthError(res.error);
  document.getElementById('auth-error').textContent = '注册成功，请登录';
  document.getElementById('auth-error').style.color = '#34c759';
  switchAuthTab('login');
  document.querySelectorAll('.auth-tab')[0].click();
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.style.color = '#ba1a1a';
  el.textContent = msg;
}

function doLogout() {
  currentUser = null;
  ['sid','userId','userName','userRole'].forEach(k => localStorage.removeItem(k));
  document.getElementById('auth-page').style.display = 'flex';
  document.getElementById('app-page').style.display = 'none';
}

function enterApp() {
  document.getElementById('auth-page').style.display = 'none';
  document.getElementById('app-page').style.display = 'block';
  document.getElementById('user-name').textContent = currentUser.name;
  const badge = document.getElementById('user-role-badge');
  if (currentUser.role === 'developer') {
    badge.innerHTML = '<span class="text-xs font-mono font-medium px-2.5 py-0.5 rounded-full bg-secondary/10 text-secondary">开发者</span>';
  } else {
    badge.innerHTML = '<span class="text-xs font-mono font-medium px-2.5 py-0.5 rounded-full bg-primary/10 text-primary">买家</span>';
  }
  renderTabs();
  showMain();
}

function renderTabs() {
  const tabsEl = document.getElementById('main-tabs');
  const createBtn = document.getElementById('btn-create');
  const navMine = document.getElementById('nav-mine');
  const navCreate = document.getElementById('nav-create');
  const navDev = document.getElementById('nav-developer');
  if (currentUser.role === 'developer') {
    tabsEl.innerHTML = `
      <button class="tab flex items-center gap-2 px-4 py-2 bg-primary text-on-primary rounded-full text-sm font-medium whitespace-nowrap active:scale-95 transition-transform" onclick="switchTab('hall', this)">

function showMain() {
  document.getElementById('main-view').style.display = 'block';
  document.getElementById('create-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'none';
  currentOrderId = null;
  currentOrder = null;
  loadOrders();
}

function showCreate() {
  document.getElementById('main-view').style.display = 'none';
  document.getElementById('create-view').style.display = 'block';
  document.getElementById('detail-view').style.display = 'none';
  ['order-userinfo','order-problem','order-features','order-anti','order-success'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

function showDetail(orderId) {
  document.getElementById('main-view').style.display = 'none';
  document.getElementById('create-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  currentOrderId = orderId;
  loadOrderDetail(orderId);
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('#main-tabs .tab').forEach(t => {
    t.classList.remove('bg-primary','text-on-primary');
    t.classList.add('glass-panel','text-on-surface-variant');
  });
  if (!el) el = document.querySelector('#main-tabs .tab:first-child');
  if (el) {
    el.classList.remove('glass-panel','text-on-surface-variant');
    el.classList.add('bg-primary','text-on-primary');
  }
  const titles = { hall: '抢单大厅', mine: '我的订单', developer: '我接的单' };
  document.getElementById('view-title').textContent = titles[tab] || '';
  loadOrders();
}

async function loadOrders() {
  const paths = { hall: '/api/orders/hall', mine: '/api/orders/mine', developer: '/api/orders/developer' };
  const res = await api('GET', paths[currentTab]);
  const list = document.getElementById('order-list');
  if (!res.success || !res.data.length) {
    const msgs = { hall: '大厅暂无订单', mine: '你还没有创建过订单', developer: '你还没有接过单' };
    const icons = { hall: 'inbox', mine: 'note_add', developer: 'code_off' };
    list.innerHTML = `<div class="text-center py-16 text-on-surface-variant">
      <span class="material-symbols-outlined text-5xl text-outline-variant mb-3 block">${icons[currentTab]}</span>
      <p class="text-sm">${msgs[currentTab]}</p>
    </div>`;
    return;
  }
  list.innerHTML = res.data.map(o => `
    <div class="glass-panel p-5 rounded-lg cursor-pointer active:scale-[0.98] transition-all hover:shadow-[0_8px_24px_-8px_rgba(30,41,59,0.12)]" onclick="showDetail('${o.id}')">
      <div class="flex items-start justify-between mb-2">
        <div class="font-semibold text-on-surface flex-1">${esc(o.title)}</div>
        <span class="status-pill text-xs font-mono font-medium px-3 py-0.5 rounded-full shrink-0 ml-3" data-status="${o.status}">${statusText(o.status)}</span>
      </div>
      <p class="text-sm text-on-surface-variant leading-relaxed line-clamp-2 mb-3">${esc(o.problem || o.description)}</p>
      <div class="flex items-center justify-between text-xs text-outline">
        <span>${esc(o.userInfo ? o.userInfo.slice(0, 30) : '')}</span>
        <span>${formatTime(o.createdAt)}</span>
      </div>
    </div>
  `).join('');
  document.querySelectorAll('.status-pill').forEach(el => {
    const s = el.dataset.status;
    const colors = {
      pending: 'bg-amber-50 text-amber-700',
      claimed: 'bg-blue-50 text-blue-700',
      in_progress: 'bg-purple-50 text-purple-700',
      reviewing: 'bg-yellow-50 text-yellow-700',
      completed: 'bg-green-50 text-green-700',
      cancelled: 'bg-red-50 text-red-700',
    };
    el.classList.add(colors[s] || 'bg-gray-100 text-gray-600');
  });
}

async function submitOrder() {
  const problem = document.getElementById('order-problem').value.trim();
  if (!problem) return alert('请填写解决什么问题');
  const res = await api('POST', '/api/orders', {
    title: problem.slice(0, 50),
    description: problem,
    userInfo: document.getElementById('order-userinfo').value.trim() || null,
    problem,
    features: document.getElementById('order-features').value.trim() || null,
    antiFeatures: document.getElementById('order-anti').value.trim() || null,
    successCriteria: document.getElementById('order-success').value.trim() || null,
  });
  if (!res.success) return alert(res.error);
  showMain();
}

async function loadOrderDetail(orderId) {
  const res = await api('GET', '/api/orders/' + orderId);
  if (!res.success) return alert(res.error);
  const o = res.data.order;
  currentOrder = o;
  document.getElementById('detail-title').textContent = o.title;
  const statusEl = document.getElementById('detail-status');
  statusEl.textContent = statusText(o.status);
  statusEl.className = 'text-xs font-mono font-medium px-3 py-1 rounded-full';
  const sColors = { pending:'bg-amber-50 text-amber-700', claimed:'bg-blue-50 text-blue-700', in_progress:'bg-purple-50 text-purple-700', reviewing:'bg-yellow-50 text-yellow-700', completed:'bg-green-50 text-green-700', cancelled:'bg-red-50 text-red-700' };
  statusEl.classList.add(...(sColors[o.status] || 'bg-gray-100 text-gray-600').split(' '));
  document.getElementById('detail-userinfo').textContent = o.userInfo || '未填写';
  document.getElementById('detail-problem').textContent = o.problem || '未填写';
  document.getElementById('detail-features').textContent = o.features || '未填写';
  document.getElementById('detail-anti').textContent = o.antiFeatures || '未填写';
  document.getElementById('detail-success').textContent = o.successCriteria || '未填写';
  document.getElementById('detail-time').textContent = formatTime(o.createdAt);
  const devEl = document.getElementById('detail-developer');
  if (o.developerId) { devEl.style.display = ''; document.getElementById('detail-dev-name').textContent = o.developerName || o.developerId; }
  else { devEl.style.display = 'none'; }
  renderActionPanel(o);
  loadBuyerProgress(o);
  loadRepoInfo(orderId);
}

function renderActionPanel(order) {
  const panel = document.getElementById('action-panel');
  const buttons = document.getElementById('action-buttons');
  if (currentUser.role !== 'developer') { panel.style.display = 'none'; return; }
  panel.style.display = '';
  if (order.status === 'pending') {
    buttons.innerHTML = '<button onclick="claimOrder()" class="px-5 py-2.5 bg-primary text-on-primary rounded-full text-sm font-semibold active:scale-95 transition-all hover:shadow-lg hover:shadow-primary/20">接此订单</button>';
    return;
  }
  if (order.developerId !== currentUser.id) {
    buttons.innerHTML = '<span class="text-sm text-outline">已被其他开发者接单</span>';
    return;
  }
  loadStages(order.id);
}

let currentStages = [];

async function loadStages(orderId) {
  const res = await api('GET', '/api/orders/' + orderId + '/stages');
  if (!res.success) return;
  currentStages = res.data || [];
  renderStages();
}

function renderStages() {
  const buttons = document.getElementById('action-buttons');
  let html = '<div class="flex gap-1 mb-6 overflow-x-auto no-scrollbar">';
  STAGE_CONFIG.forEach((cfg, i) => {
    const stage = currentStages.find(s => s.stage === cfg.key);
    const status = stage ? stage.status : 'pending';
    const dotClass = status === 'completed' ? 'bg-green-500 text-white border-green-500' :
                     status === 'in_progress' ? 'bg-primary text-white border-primary shadow-[0_0_0_4px_rgba(183,0,79,0.15)]' :
                     'bg-surface-container text-outline border-outline-variant/50';
    html += `<div class="flex-1 text-center min-w-[60px]">
      <div class="w-8 h-8 rounded-full border-2 flex items-center justify-center mx-auto mb-1.5 text-xs font-bold transition-all ${dotClass}">
        ${status === 'completed' ? '<span class="material-symbols-outlined text-sm">check</span>' : (i+1)}
      </div>
      <div class="text-[10px] font-medium ${status === 'completed' ? 'text-green-600' : status === 'in_progress' ? 'text-primary' : 'text-outline'}">${cfg.name}</div>
    </div>`;
  });
  html += '</div>';

  let activeStage = STAGE_CONFIG.find(cfg => {
    const s = currentStages.find(x => x.stage === cfg.key);
    return s && s.status !== 'completed';
  });
  if (!activeStage && currentStages.length === 0) activeStage = STAGE_CONFIG[0];

  if (activeStage) {
    const stage = currentStages.find(s => s.stage === activeStage.key);
    const cfg = activeStage;
    let savedContent = {};
    try { savedContent = stage?.content ? JSON.parse(stage.content) : {}; } catch(e) {}

    html += `<div class="bg-white/30 rounded-xl p-5 border border-white/40">
      <div class="flex items-center gap-2 mb-1">
        <span class="text-sm font-bold text-on-surface">${cfg.name}</span>
        <span class="text-[10px] font-mono px-2 py-0.5 rounded-full ${stage?.status === 'completed' ? 'bg-green-50 text-green-600' : stage?.status === 'in_progress' ? 'bg-blue-50 text-blue-600' : 'bg-gray-100 text-gray-500'}">${stage?.status === 'completed' ? '已完成' : stage?.status === 'in_progress' ? '进行中' : '待开始'}</span>
      </div>
      <p class="text-xs text-on-surface-variant mb-4">${cfg.desc}</p>`;

    cfg.fields.forEach((f, i) => {
      html += `<div class="mb-3">
        <label class="block text-xs font-medium text-on-surface-variant mb-1">${f.label}</label>
        <textarea id="field-${cfg.key}-${i}" rows="2" placeholder="${f.placeholder}" class="w-full px-3 py-2 bg-white/50 border border-white/60 rounded-xl text-sm text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all resize-none">${esc(savedContent[f.label] || '')}</textarea>
      </div>`;
    });

    html += `<div class="flex gap-2 mt-4">
      ${stage?.status !== 'completed' ? `<button onclick="saveStage('${cfg.key}')" class="px-4 py-2 bg-surface-container text-on-surface rounded-full text-xs font-medium active:scale-95 transition-all">保存</button>` : ''}
      ${stage?.status !== 'completed' ? `<button onclick="completeStage('${cfg.key}')" class="px-4 py-2 bg-green-500 text-white rounded-full text-xs font-semibold active:scale-95 transition-all hover:shadow-lg hover:shadow-green-500/20">${cfg.completeBtn}</button>` : ''}
    </div></div>`;
  } else {
    html += '<div class="text-center py-6"><span class="material-symbols-outlined text-4xl text-green-500 mb-2 block">celebration</span><p class="text-sm font-medium text-on-surface">所有阶段已完成！等待买家验收</p></div>';
  }

  buttons.innerHTML = html;
}

async function saveStage(stageKey) {
  const cfg = STAGE_CONFIG.find(c => c.key === stageKey);
  const content = {};
  cfg.fields.forEach((f, i) => {
    const el = document.getElementById(`field-${stageKey}-${i}`);
    if (el) content[f.label] = el.value.trim();
  });
  if (!Object.values(content).some(v => v)) return alert('请至少填写一项内容');
  const res = await api('PUT', '/api/orders/' + currentOrderId + '/stages/' + stageKey, { content: JSON.stringify(content) });
  if (!res.success) return alert(res.error);
  loadStages(currentOrderId);
}

async function completeStage(stageKey) {
  const cfg = STAGE_CONFIG.find(c => c.key === stageKey);
  const content = {};
  cfg.fields.forEach((f, i) => {
    const el = document.getElementById(`field-${stageKey}-${i}`);
    if (el) content[f.label] = el.value.trim();
  });
  if (!Object.values(content).some(v => v)) return alert('请先填写内容');
  const res = await api('PUT', '/api/orders/' + currentOrderId + '/stages/' + stageKey, { content: JSON.stringify(content) });
  if (!res.success) return alert(res.error);
  const res2 = await api('POST', '/api/orders/' + currentOrderId + '/stages/' + stageKey + '/complete');
  if (!res2.success) return alert(res2.error);
  if (res2.data?.allCompleted) alert('所有阶段已完成！订单已进入验收状态');
  loadStages(currentOrderId);
}

async function claimOrder() {
  if (!confirm('确定要接这个订单吗？')) return;
  const res = await api('POST', '/api/orders/' + currentOrderId + '/claim');
  if (!res.success) return alert(res.error);
  loadOrderDetail(currentOrderId);
}

async function updateStatus(status) {
  const labels = { in_progress: '开始开发', reviewing: '提交验收', completed: '确认完成' };
  if (!confirm('确定要' + (labels[status] || '更新状态') + '吗？')) return;
  const res = await api('POST', '/api/orders/' + currentOrderId + '/status', { status });
  if (!res.success) return alert(res.error);
  loadOrderDetail(currentOrderId);
}

async function loadBuyerProgress(order) {
  const card = document.getElementById('buyer-stage-progress');
  const detail = document.getElementById('buyer-stage-detail');
  const cardEl = document.getElementById('buyer-progress-card');
  if (!order.developerId) { cardEl.style.display = 'none'; return; }
  const res = await api('GET', '/api/orders/' + order.id + '/stages');
  if (!res.success || !res.data.length) { cardEl.style.display = 'none'; return; }
  cardEl.style.display = '';
  const stages = res.data;

  let html = '<div class="flex gap-1 mb-4 overflow-x-auto no-scrollbar">';
  STAGE_CONFIG.forEach((cfg, i) => {
    const stage = stages.find(s => s.stage === cfg.key);
    const status = stage ? stage.status : 'pending';
    const dotClass = status === 'completed' ? 'bg-green-500 text-white border-green-500' :
                     status === 'in_progress' ? 'bg-primary text-white border-primary shadow-[0_0_0_4px_rgba(183,0,79,0.15)]' :
                     'bg-surface-container text-outline border-outline-variant/50';
    html += `<div class="flex-1 text-center min-w-[60px]">
      <div class="w-8 h-8 rounded-full border-2 flex items-center justify-center mx-auto mb-1.5 text-xs font-bold transition-all ${dotClass}">
        ${status === 'completed' ? '<span class="material-symbols-outlined text-sm">check</span>' : (i+1)}
      </div>
      <div class="text-[10px] font-medium ${status === 'completed' ? 'text-green-600' : status === 'in_progress' ? 'text-primary' : 'text-outline'}">${cfg.name}</div>
    </div>`;
  });
  html += '</div>';
  card.innerHTML = html;

  let detailHtml = '';
  STAGE_CONFIG.forEach(cfg => {
    const stage = stages.find(s => s.stage === cfg.key);
    if (!stage || stage.status === 'pending') return;
    let content = {};
    try { content = stage.content ? JSON.parse(stage.content) : {}; } catch(e) {}
    detailHtml += `<div class="bg-white/30 rounded-xl p-4 border border-white/40">
      <div class="flex items-center gap-2 mb-3">
        <span class="text-sm font-bold text-on-surface">${cfg.name}</span>
        <span class="text-[10px] font-mono px-2 py-0.5 rounded-full ${stage.status === 'completed' ? 'bg-green-50 text-green-600' : 'bg-blue-50 text-blue-600'}">${stage.status === 'completed' ? '已完成' : '进行中'}</span>
      </div>`;
    cfg.fields.forEach(f => {
      const val = content[f.label] || '';
      if (val) detailHtml += `<div class="mb-2"><div class="text-[10px] font-mono text-on-surface-variant uppercase tracking-wider mb-0.5">${f.label}</div><div class="text-sm text-on-surface leading-relaxed">${esc(val)}</div></div>`;
    });
    detailHtml += '</div>';
  });
  detail.innerHTML = detailHtml || '<div class="text-center py-4 text-sm text-outline">开发者尚未开始</div>';
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function statusText(s) { return { pending:'待接单', claimed:'已接单', in_progress:'开发中', reviewing:'验收中', completed:'已完成', cancelled:'已取消' }[s] || s; }
function formatTime(t) { if (!t) return ''; const d = new Date(t + 'Z'); return d.toLocaleDateString('zh-CN') + ' ' + d.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' }); }

      <div id="repo-tree" style="display:none">
        <div class="mb-3">
          <select id="tree-ref" class="w-full px-3 py-2 bg-white/50 border border-white/60 rounded-xl text-xs text-on-surface focus:outline-none focus:ring-2 focus:ring-primary/30" onchange="loadTreeView()"></select>
        </div>
        <div id="tree-results"></div>
      </div>
    </div>`;
  document.getElementById('repo-status').innerHTML = `
    <span class="flex items-center gap-1"><span class="text-outline">分支</span> <span class="font-medium text-on-surface">${esc(repoData.currentBranch)}</span></span>
    <span class="flex items-center gap-1"><span class="text-outline">版本</span> <span class="font-medium text-on-surface">${esc(repoData.currentRef || '-')}</span></span>
    <span class="flex items-center gap-1"><span class="text-outline">提交</span> <span class="font-medium text-on-surface">${repoData.totalCommits}</span></span>`;
  loadCommits(orderId);
}

async function initCurrentRepo() {
  const res = await api('POST', '/api/repos/' + currentOrderId + '/init', {});
  if (!res.success) return alert('初始化失败: ' + (res.error || '未知错误'));
  alert('✅ 仓库初始化成功！现在可以提交代码了');
  loadRepoInfo(currentOrderId);
}

// ─── 提交代码表单 ─────────────────────────────────────
let commitFileCount = 1;

function renderCommitForm() {
  const el = document.getElementById('commit-form');
  el.innerHTML = `
    <div class="bg-blue-50 border border-blue-100 rounded-xl p-4 text-xs text-blue-700 leading-relaxed mb-4">
      <strong>💡 如何提交代码？</strong>
      <ol class="list-decimal ml-4 mt-2 space-y-1">
        <li>点击下方 <strong>"从本机选择文件"</strong>，在工程目录里选中你要提交的文件（可多选）</li>
        <li>文件会自动读入，<strong>文件路径</strong> 可以手动修改</li>
        <li>也可以手动 <strong>"+ 添加文件"</strong>，粘贴代码片段</li>
        <li>填写 <strong>提交说明</strong>，点击提交即可</li>
      </ol>
    </div>
    <div>
      <label class="block text-xs font-medium text-on-surface-variant mb-1.5 font-mono uppercase tracking-wider">提交说明</label>
      <input id="commit-message" type="text" placeholder="例如：实现了用户登录功能" class="w-full px-4 py-3 bg-white/50 border border-white/60 rounded-xl text-sm text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all"/>
    </div>
    <div>
      <div class="flex items-center justify-between mb-1.5">
        <label class="block text-xs font-medium text-on-surface-variant font-mono uppercase tracking-wider">文件列表</label>
        <div class="flex gap-2">
          <button onclick="document.getElementById('folder-picker').click()" class="text-xs bg-surface-container text-on-surface px-3 py-1.5 rounded-full hover:bg-surface-container-high transition-all">
            📁 选择文件夹（保留目录结构）
          </button>
          <button onclick="document.getElementById('file-picker').click()" class="text-xs text-on-surface-variant hover:text-primary transition-all">
            或选单个文件
          </button>
          <button onclick="addCommitFileEntry()" class="text-xs text-primary font-medium hover:underline">+ 手动添加</button>
        </div>
      </div>
      <input id="folder-picker" type="file" webkitdirectory multiple style="display:none" onchange="handleFolderPicked(this)"/>
      <input id="file-picker" type="file" multiple style="display:none" onchange="handleFilePicked(this)"/>
      <div id="commit-files" class="space-y-3"></div>
    </div>
    <button onclick="submitCommit()" class="w-full py-3 bg-primary text-on-primary rounded-full text-sm font-semibold active:scale-95 transition-all hover:shadow-lg hover:shadow-primary/20">
      <span class="material-symbols-outlined text-base align-middle mr-1">upload</span>
      提交代码
    </button>
    <div id="commit-error" class="text-xs text-center min-h-5"></div>
  `;
  commitFileCount = 1;
  addCommitFileEntry();
}

function handleFilePicked(input) {
  const files = input.files;
  if (!files || !files.length) return;
  for (const file of files) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const content = e.target.result;
      addCommitFileEntry(file.name, content);
    };
    reader.readAsText(file);
  }
  input.value = '';
}

function handleFolderPicked(input) {
  const files = input.files;
  if (!files || !files.length) return;

  // 提示用户
  const msgEl = document.getElementById('commit-error');
  msgEl.style.color = '#2563eb';
  msgEl.textContent = '⏳ 正在读取文件（跳过 node_modules、.git 等目录）...';

  // 跳过常见的大型/无关目录
  const skipDirs = ['node_modules', '.git', '.mimocode', '.claude', 'dist', '.next', 'build', 'target', '__pycache__', '.vscode', 'vendor', '.DS_Store'];
  const skipSuffix = ['.png', '.jpg', '.jpeg', '.gif', '.ico', '.svg', '.woff', '.woff2', '.eot', '.ttf', '.map'];

  const sorted = Array.from(files)
    .filter(f => {
      const p = f.webkitRelativePath.replace(/\\/g, '/');
      // 跳过黑名单目录中的文件
      for (const dir of skipDirs) {
        if (p.includes('/' + dir + '/') || p.startsWith(dir + '/')) return false;
      }
      // 跳过二进制/大文件后缀
      for (const ext of skipSuffix) {
        if (p.endsWith(ext)) return false;
      }
      return true;
    })
    .sort((a, b) => a.webkitRelativePath.localeCompare(b.webkitRelativePath));

  if (sorted.length === 0) {
    msgEl.textContent = '⚠️ 所选文件夹中没有可读的代码文件';
    input.value = '';
    return;
  }

  msgEl.textContent = '⏳ 正在读取 ' + sorted.length + ' 个文件...';

  // 分批处理，避免卡死 UI
  let index = 0;
  function readNextBatch() {
    const batchSize = 5;
    const end = Math.min(index + batchSize, sorted.length);
    let completed = 0;
    for (let i = index; i < end; i++) {
      const file = sorted[i];
      const reader = new FileReader();
      reader.onload = function(e) {
        addCommitFileEntry(file.webkitRelativePath.replace(/\\/g, '/'), e.target.result);
        completed++;
        if (i + completed >= end) {
          index = end;
          if (index < sorted.length) {
            msgEl.textContent = '⏳ 正在读取... (' + index + '/' + sorted.length + ')';
            setTimeout(readNextBatch, 50);
          } else {
            msgEl.textContent = '✅ 已加载 ' + sorted.length + ' 个文件';
            setTimeout(() => { msgEl.textContent = ''; }, 3000);
          }
        }
      };
      reader.readAsText(file);
    }
  }
  readNextBatch();
  input.value = '';
}

function addCommitFileEntry(path, content) {
  const container = document.getElementById('commit-files');
  const idx = commitFileCount++;
  const div = document.createElement('div');
  div.className = 'p-3 bg-white/30 rounded-xl border border-white/40';
  div.id = 'commit-file-' + idx;
  div.innerHTML = `
    <div class="flex items-center gap-2 mb-2">
      <input id="cf-path-${idx}" type="text" placeholder="文件路径（如 src/index.ts）" value="${esc(path || '')}"
        class="flex-1 px-3 py-2 bg-white/50 border border-white/60 rounded-xl text-xs font-mono text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all"/>
      <button onclick="this.closest('.p-3').remove()" class="w-7 h-7 flex items-center justify-center rounded-full text-outline hover:text-red-500 hover:bg-red-50 transition-all">
        <span class="material-symbols-outlined text-sm">close</span>
      </button>
    </div>
    <textarea id="cf-content-${idx}" rows="6" placeholder="粘贴文件内容..." class="w-full px-3 py-2 bg-white/50 border border-white/60 rounded-xl text-xs font-mono text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all resize-none">${esc(content || '')}</textarea>
  `;
  container.appendChild(div);
}

async function submitCommit() {
  const message = document.getElementById('commit-message').value.trim();
  if (!message) return showCommitError('请填写提交说明');

  const fileEntries = document.querySelectorAll('[id^="commit-file-"]');
  const files = [];
  for (const entry of fileEntries) {
    const idx = entry.id.replace('commit-file-', '');
    const pathEl = document.getElementById('cf-path-' + idx);
    const contentEl = document.getElementById('cf-content-' + idx);
    if (pathEl && contentEl && pathEl.value.trim()) {
      files.push({ path: pathEl.value.trim(), content: contentEl.value });
    }
  }
  if (!files.length) return showCommitError('请至少添加一个文件');

  const btn = document.querySelector('#commit-form button:last-of-type');
  const origText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-outlined text-base align-middle mr-1">hourglass_top</span> 提交中...';

  const res = await api('POST', '/api/repos/' + currentOrderId + '/commit', { message, files });
  btn.disabled = false;
  btn.innerHTML = origText;
  if (!res.success) return showCommitError(res.error || '提交失败');

  // 成功
  document.getElementById('commit-error').textContent = '';
  document.getElementById('commit-error').style.color = '';
  alert('✅ 已创建 ' + res.data.ref + '：' + res.data.message);
  // 清空表单
  renderCommitForm();
  // 刷新版本历史
  loadRepoInfo(currentOrderId);
}

function showCommitError(msg) {
  const el = document.getElementById('commit-error');
  el.style.color = '#ba1a1a';
  el.textContent = msg;
}

async function loadCommits(orderId, branch) {
  let path = '/api/repos/' + orderId + '/commits';
  if (branch) path += '?branch=' + branch;
  const res = await api('GET', path);
  if (!res.success) return;
  repoCommits = res.data.commits || [];
  renderCommits();
  populateVersionSelects();
}

function renderCommits() {
  const el = document.getElementById('repo-commits');
  if (!repoCommits.length) {
    el.innerHTML = '<div class="text-center py-8 text-sm text-outline"><span class="material-symbols-outlined text-3xl text-outline-variant mb-2 block">history</span>暂无提交记录</div>';
    return;
  }
  el.innerHTML = '<div class="space-y-2">' + repoCommits.map(c => `
    <div class="p-4 bg-white/30 rounded-xl border border-white/40 cursor-pointer hover:bg-white/50 transition-all active:scale-[0.98]" onclick="toggleVersion('${c.ref}')">
      <div class="flex items-center justify-between mb-1">
        <span class="text-sm font-bold text-primary font-mono">${esc(c.ref)}</span>
        <button class="text-[10px] text-on-surface-variant hover:text-primary px-2 py-0.5 rounded-full hover:bg-primary/5 transition-all" onclick="event.stopPropagation();showRollbackConfirm('${c.ref}')">⏪ 回退</button>
      </div>
      <p class="text-sm text-on-surface mb-2">${esc(c.message)}</p>
      <div class="flex items-center gap-3 text-[10px] text-outline">
        <span>${esc(c.authorName)}</span>
        <span>${c.fileCount} 个文件</span>
        <span>${formatTime(c.createdAt)}</span>
        ${c.parentRef ? '<span>← ' + esc(c.parentRef) + '</span>' : '<span>初始提交</span>'}
      </div>
      <div id="v-files-${c.ref}" class="hidden mt-3 pt-3 border-t border-outline-variant/20 text-xs text-outline">加载中...</div>
    </div>
  `).join('') + '</div>';
}

async function toggleVersion(ref) {
  const filesEl = document.getElementById('v-files-' + ref);
  if (filesEl.classList.contains('hidden')) {
    filesEl.classList.remove('hidden');
    const res = await api('GET', '/api/repos/' + currentOrderId + '/tree?ref=' + ref);
    if (res.success && res.data?.files?.length) {
      filesEl.innerHTML = res.data.files.map(f => `<div class="flex items-center gap-2 py-1"><span class="material-symbols-outlined text-sm ${f.action === 'delete' ? 'text-red-400' : 'text-outline'}">${f.action === 'delete' ? 'delete' : 'description'}</span><span class="text-on-surface">${esc(f.path)}</span><span class="text-outline ml-auto">${f.size ? formatBytes(f.size) : ''}</span></div>`).join('');
    } else {
      filesEl.innerHTML = '<span class="text-outline">（无文件）</span>';
    }
  } else {
    filesEl.classList.add('hidden');
  }
}

function showRollbackConfirm(ref) {
  if (!confirm('确定要回退到 ' + ref + ' 吗？\n\n这将创建一个新提交恢复到 ' + ref + ' 的状态。历史不会丢失。')) return;
  doRollback(ref);
}

async function doRollback(ref) {
  const res = await api('POST', '/api/repos/' + currentOrderId + '/rollback', { ref });
  if (!res.success) return alert('回退失败: ' + (res.error || '未知错误'));
  alert('✅ 已创建 ' + res.data.newRef + '，回退到 ' + ref + ' 完成！');
  loadRepoInfo(currentOrderId);
}

function populateVersionSelects() {
  const fromEl = document.getElementById('diff-from');
  const toEl = document.getElementById('diff-to');
  const treeRefEl = document.getElementById('tree-ref');
  if (!fromEl) return;
  const options = repoCommits.map(c => `<option value="${c.ref}">${c.ref}: ${esc(c.message.slice(0, 40))}</option>`).join('');
  fromEl.innerHTML = '<option value="">选择起始版本</option>' + options;
  toEl.innerHTML = '<option value="">选择目标版本</option>' + options;
  treeRefEl.innerHTML = '<option value="">最新版本</option>' + options;
  if (repoCommits.length >= 2) { fromEl.value = repoCommits[repoCommits.length - 2].ref; toEl.value = repoCommits[0].ref; loadDiffView(); }
  else if (repoCommits.length === 1) { toEl.value = repoCommits[0].ref; }
}

async function loadDiffView() {
  const from = document.getElementById('diff-from').value;
  const to = document.getElementById('diff-to').value;
  const el = document.getElementById('diff-results');
  if (!from || !to) { el.innerHTML = '<div class="text-center py-6 text-sm text-outline">请选择两个版本进行对比</div>'; return; }
  el.innerHTML = '<div class="text-center py-6 text-sm text-outline">加载中...</div>';
  const res = await api('GET', `/api/repos/${currentOrderId}/diff?from=${from}&to=${to}`);
  if (!res.success || !res.data) { el.innerHTML = '<div class="text-center py-6 text-sm text-outline">加载失败</div>'; return; }
  const changes = res.data.changes || [];
  if (!changes.length) { el.innerHTML = '<div class="text-center py-6 text-sm text-outline">两个版本之间没有差异</div>'; return; }
  el.innerHTML = '<div class="text-xs text-on-surface-variant mb-2">从 <strong>' + from + '</strong> 到 <strong>' + to + '</strong> 共 ' + changes.length + ' 处变化</div>' +
    '<div class="space-y-1">' + changes.map(c => {
      const aColors = { add:'bg-green-50 text-green-600', modify:'bg-blue-50 text-blue-600', delete:'bg-red-50 text-red-600' };
      return `<div class="flex items-center gap-2 py-2 px-3 bg-white/30 rounded-lg text-xs">
        <span class="font-mono font-bold px-2 py-0.5 rounded ${aColors[c.action] || ''}">${c.action}</span>
        <span class="text-on-surface font-mono">${esc(c.path)}</span>
      </div>`;
    }).join('') + '</div>';
}

async function loadTreeView() {
  const ref = document.getElementById('tree-ref').value;
  const el = document.getElementById('tree-results');
  el.innerHTML = '<div class="text-center py-6 text-sm text-outline">加载中...</div>';
  let path = '/api/repos/' + currentOrderId + '/tree';
  if (ref) path += '?ref=' + ref;
  const res = await api('GET', path);
  if (!res.success || !res.data) { el.innerHTML = '<div class="text-center py-6 text-sm text-outline">暂无文件</div>'; return; }
  const files = res.data.files || [];
  if (!files.length) { el.innerHTML = '<div class="text-center py-6 text-sm text-outline">该版本没有文件</div>'; return; }
  el.innerHTML = '<div class="text-xs text-on-surface-variant mb-2">' + esc(res.data.ref) + ': ' + esc(res.data.message) + ' — ' + files.length + ' 个文件</div>' +
    '<div class="space-y-1">' + files.map(f => `
      <div class="flex items-center gap-2 py-2 px-3 bg-white/30 rounded-lg text-xs">
        <span class="material-symbols-outlined text-sm ${f.action === 'delete' ? 'text-red-400' : 'text-outline'}">${f.action === 'delete' ? 'delete' : 'description'}</span>
        <span class="text-on-surface font-mono flex-1">${esc(f.path)}</span>
        <span class="text-outline">${f.size ? formatBytes(f.size) : ''}</span>
      </div>
    `).join('') + '</div>';
}

function switchRepoTab(tab, el) {
  currentRepoTab = tab;
  document.querySelectorAll('.repo-tab').forEach(t => {
    t.classList.remove('bg-primary','text-on-primary');
    t.classList.add('text-on-surface-variant');
  });
  if (!el) el = document.querySelector('.repo-tab:first-child');
  if (el) { el.classList.remove('text-on-surface-variant'); el.classList.add('bg-primary','text-on-primary'); }
  document.getElementById('repo-commit').style.display = tab === 'commit' ? '' : 'none';
  document.getElementById('repo-commits').style.display = tab === 'commits' ? '' : 'none';
  document.getElementById('repo-diff').style.display = tab === 'diff' ? '' : 'none';
  document.getElementById('repo-tree').style.display = tab === 'tree' ? '' : 'none';
  if (tab === 'diff') loadDiffView();
  if (tab === 'tree') loadTreeView();
  if (tab === 'commit') renderCommitForm();
}

function formatBytes(bytes) {
  if (!bytes || bytes === 0) return '0 B';
  const units = ['B', 'KB', 'MB'];
  const i = Math.floor(Math.log(bytes) / Math.log(1024));
  return (bytes / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
}

(function init() {
  const sid = localStorage.getItem('sid');
  const id = localStorage.getItem('userId');
  const name = localStorage.getItem('userName');
  const role = localStorage.getItem('userRole');
  if (sid) { currentUser = { sid, id, name, role }; enterApp(); }
})();
</script>
